<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Poppins",sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f5f7fa;
}

/* CONTAINER */
.container{
  text-align:center;
  max-width:500px;
}

/* 404 TEXT */
h1{
  font-size:120px;
  color:#0b1f33;
  font-weight:800;
}

/* SUB TEXT */
h2{
  font-size:24px;
  margin:10px 0;
  color:#333;
}

p{
  color:#777;
  margin-bottom:20px;
}

/* SEARCH BOX */
.search-box{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:6px;
  margin-bottom:20px;
  outline:none;
}

/* BUTTON */
.btn{
  padding:12px 30px;
  background:#0b1f33;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:16px;
  transition:0.3s;
}

.btn:hover{
  background:#142f4c;
}

/* MOBILE */
@media(max-width:500px){
  h1{
    font-size:80px;
  }
}
</style>
</head>

<body>

<div class="container">

  <h1>404</h1>

  <h2>Oops! Page not found</h2>

  <p>
    The page you are looking for might have been removed 
    or does not exist.
  </p>

  <input type="text" class="search-box" placeholder="Search here">

  <br>

  <button class="btn" onclick="goHome()">Back to Home</button>

</div>

<script>
function goHome(){
  window.location.href="index.html";
}
</script>

</body>
</html>
